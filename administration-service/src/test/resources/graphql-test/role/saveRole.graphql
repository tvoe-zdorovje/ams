mutation SaveRole(
    $id: ID
    $organizationId: ID!
    $name: String!
    $description: String!
    $permissions: [ID!]
) {
    roles {
        saveRole(
            request: {
                id: $id
                organizationId: $organizationId
                name: $name
                description: $description
                permissions: $permissions
            }
        )
    }
}
