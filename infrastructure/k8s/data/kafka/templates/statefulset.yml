apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "default.labels" . | indent 4 }}
  annotations:
    {{- include "default.annotations" . | indent 4 }}
spec:
  serviceName: {{ .Release.Name }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "default.labels" . | indent 8 }}
    spec:
      initContainers:
        - name: set-permissions
          image: busybox
          command:
            - sh
            - -c
            - "chown -R 1000:1000 {{ .Values.persistence.path }}"
          volumeMounts:
          - mountPath: {{ .Values.persistence.path }}
            name: {{ .Release.Name }}-data
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "required.container.parameters" . | indent 10  }}
          ports:
            {{- range $value := .Values.service.ports }}
              - containerPort: {{ $value.targetPort }}
                protocol: {{ $value.protocol }}
            {{- end }}
          {{- if or .Values.cm .Values.secret }}
          envFrom:
          {{- if .Values.cm }}
            - configMapRef:
                name: {{ .Release.Name }}-env
          {{- end }}
          {{- if .Values.secret }}
            - secretRef:
                name: {{ .Release.Name }}
          {{- end }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
              {{ toYaml .Values.livenessProbe | nindent 12 }}
            {{- end }}
            {{- if .Values.readinessProbe }}
          readinessProbe:
              {{ toYaml .Values.readinessProbe | nindent 12 }}
            {{- end }}
            {{- if .Values.startupProbe }}
          startupProbe:
              {{ toYaml .Values.startupProbe | nindent 12 }}
            {{- end }}
          {{- if .Values.resources }}
          resources:
                  {{- if .Values.resources.requests }}
            requests:
                  {{- if .Values.resources.requests.cpu }}
              cpu: {{ .Values.resources.requests.cpu | default "125m" }}
                  {{- end }}
                  {{- if .Values.resources.requests.memory }}
              memory: {{ .Values.resources.requests.memory | default "256Mi" }}
                  {{- end }}
                  {{- end }}
                  {{- if .Values.resources.limits }}
            limits:
                  {{- if .Values.resources.limits.cpu }}
              cpu: {{ .Values.resources.limits.cpu }}
                  {{- end }}
                  {{- if .Values.resources.limits.memory }}
              memory: {{ .Values.resources.limits.memory }}
                  {{- end }}
                  {{- end }}
                  {{- end }}
          volumeMounts:
            - name: {{ .Release.Name }}-data
              mountPath: {{ .Values.persistence.path }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - {{ .Release.Name }}
              topologyKey: "kubernetes.io/hostname"
  volumeClaimTemplates:
    - metadata:
        name: {{ .Release.Name }}-data
        namespace: {{ .Release.Namespace }}
        labels:
          {{- include "default.labels" . | indent 12 }}
        annotations:
          {{- include "default.annotations" . | indent 12 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessModes }}
        resources:
          requests:
            storage: {{ .Values.persistence.storage }}
