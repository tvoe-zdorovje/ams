replicaCount: 1

image:
  repository: "ghcr.io/tvoe-zdorovje/ams/kafka-connect"
  tag: "8.0.3-debezium-3.4.1"
  pullPolicy: IfNotPresent
  pullSecret: github-registry

service:
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
      name: rest

connectors:
  mountPath: /etc/kafka-connect/connectors

resources:
  requests:
    cpu: 125m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /connector-plugins
    port: rest
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /connector-plugins
    port: rest
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

startupProbe:
  httpGet:
    path: /connector-plugins
    port: rest
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

podAnnotations: {}
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - "{{ .Release.Name }}"
        topologyKey: "kubernetes.io/hostname"
tolerations: []

cm:
  env:
    CONNECT_BOOTSTRAP_SERVERS: kafka:29092
    CONNECT_REST_ADVERTISED_HOST_NAME: "{{ .Release.Name }}"
    CONNECT_REST_PORT: 8083
    CONNECT_GROUP_ID: kafka-connect-group
    CONNECT_TOPIC_CREATION_ENABLE: "true"
    CONNECT_TOPIC_PARTITIONS: 3
    CONNECT_TOPIC_REPLICATION_FACTOR: 1
    CONNECT_CONFIG_STORAGE_TOPIC: kafka-connect-configs
    CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
    CONNECT_OFFSET_STORAGE_TOPIC: kafka-connect-offsets
    CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
    CONNECT_STATUS_STORAGE_TOPIC: kafka-connect-status
    CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
    CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
    CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
    CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    CONNECT_VALUE_CONVERTER_AUTO_REGISTER_SCHEMAS: "true"
    CONNECT_PUBLICATION_AUTOCREATE_MODE: "disabled"
    CONNECT_SLOT_AUTOCREATE: "true"
    CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    CONNECT_SNAPSHOT_MODE: "never"
