kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-env
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "default.labels" . | indent 4 }}
  annotations:
    {{- include "default.annotations" . | indent 4 }}
data:
  {{- range $key, $value := .Values.cm.env }}
  {{ $key }}: {{ tpl (printf "%v" $value) $ | quote }}
  {{- end }}
