kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-connectors
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "default.labels" . | indent 4 }}
  annotations:
    {{- include "default.annotations" . | indent 4 }}
data:
  {{- $files := .Files.Glob "files/connectors/*.json" }}
  {{- range $path, $_ := $files }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
