services:
  gateway:
    build:
      context: gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: on-failure
    depends_on:
      auth-service:
        condition: service_healthy
      administration-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      brand-service:
        condition: service_healthy
      studio-service:
        condition: service_healthy
      user_db:
        condition: service_healthy
    ports:
      - "4000:8080"
    volumes:
      - ./gateway/apollo/router/router.yaml:/dist/config/router.yaml
      - ./gateway/apollo/router/supergraph-config.yaml:/tmp/app/supergraph-config.yaml
      - ./gateway/apollo/router/plugin/:/tmp/app/plugin/
      - ./graphql:/tmp/app/schemas/service
    env_file:
      - gateway/.env

  user_db:
    image: postgres:17.2-alpine3.21
    container_name: user_db
    restart: on-failure
    ports:
        - "5441:5432"
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$DBPASS pg_isready -U $DBUSER -d $DBNAME" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - user_db_volume:/var/lib/postgresql/data
      - ./user-service/database/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    env_file:
      - user-service/.env

  liquibase_user_db:
    image: liquibase/liquibase:latest-alpine
    container_name: liquibase_user_db
    restart: on-failure
    env_file:
      - user-service/.env
    depends_on:
      user_db:
        condition: service_healthy
    volumes:
      - ./user-service/database/changelog:/liquibase/changelog
      - ./user-service/database/test:/liquibase/tests
      - ./postgres/test/_util:/liquibase/tests/_util
    command:
      - update

  user-service:
    build:
      context: user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: on-failure
    depends_on:
      liquibase_user_db:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 50s
    ports:
      - "8081:8080"
    volumes:
      - ./user-service/build/libs/user-service.war:/var/lib/jetty/webapps/ROOT.war
    env_file:
      - user-service/.env

  brand_db:
    image: postgres:17.2-alpine3.21
    container_name: brand_db
    restart: on-failure
    ports:
      - "5442:5432"
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$DBPASS pg_isready -U $DBUSER -d $DBNAME" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - brand_db_volume:/var/lib/postgresql/data
      - ./brand-service/database/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./brand-service/database/pg_service.conf:/var/lib/postgresql/.pg_service.conf
    env_file:
      - brand-service/.env

  liquibase_brand_db:
    image: liquibase/liquibase:latest-alpine
    container_name: liquibase_brand_db
    restart: on-failure
    env_file:
      - brand-service/.env
    depends_on:
      brand_db:
        condition: service_healthy
    volumes:
      - ./brand-service/database/changelog:/liquibase/changelog
      - ./brand-service/database/test:/liquibase/tests
      - ./postgres/test/_util:/liquibase/tests/_util
    command:
      - update

  brand-service:
    image: jetty:11-jdk17-alpine-eclipse-temurin
    container_name: brand-service
    restart: on-failure
    depends_on:
      liquibase_brand_db:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 50s
    ports:
      - "8082:8080"
    volumes:
      - ./brand-service/build/libs/brand-service.war:/var/lib/jetty/webapps/ROOT.war
    env_file:
      - brand-service/.env

  studio_db:
    image: postgres:17.2-alpine3.21
    container_name: studio_db
    restart: on-failure
    ports:
      - "5443:5432"
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$DBPASS pg_isready -U $DBUSER -d $DBNAME" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - studio_db_volume:/var/lib/postgresql/data
      - ./studio-service/database/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./studio-service/database/pg_service.conf:/var/lib/postgresql/.pg_service.conf
    env_file:
      - studio-service/.env

  liquibase_studio_db:
    image: liquibase/liquibase:latest-alpine
    container_name: liquibase_studio_db
    restart: on-failure
    env_file:
      - studio-service/.env
    depends_on:
      studio_db:
        condition: service_healthy
    volumes:
      - ./studio-service/database/changelog:/liquibase/changelog
      - ./studio-service/database/test:/liquibase/tests
      - ./postgres/test/_util:/liquibase/tests/_util
    command:
      - update
  
  studio-service:
    image: jetty:11-jdk17-alpine-eclipse-temurin
    container_name: studio-service
    restart: on-failure
    depends_on:
      liquibase_studio_db:
        condition: service_completed_successfully
    ports:
      - "8083:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 50s
    volumes:
      - ./studio-service/build/libs/studio-service.war:/var/lib/jetty/webapps/ROOT.war
    env_file:
      - studio-service/.env

  administration_db:
    image: postgres:17.2-alpine3.21
    container_name: administration_db
    restart: on-failure
    ports:
      - "5444:5432"
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$DBPASS pg_isready -U $DBUSER -d $DBNAME" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      liquibase_user_db:
        condition: service_completed_successfully
      liquibase_brand_db:
        condition: service_completed_successfully
      liquibase_studio_db:
        condition: service_completed_successfully
    volumes:
      - administration_db_volume:/var/lib/postgresql/data
      - ./administration-service/database/init_db.sql:/docker-entrypoint-initdb.d/init_administration_db.sql
      - ./appointment-service/database/init_db.sql:/docker-entrypoint-initdb.d/init_appointment_db.sql
    env_file:
      - administration-service/.env

  liquibase_administration_db:
    image: liquibase/liquibase:latest-alpine
    container_name: liquibase_administration_db
    restart: on-failure
    env_file:
      - administration-service/.env
    depends_on:
      administration_db:
        condition: service_healthy
    volumes:
      - ./administration-service/database/changelog:/liquibase/changelog
      - ./administration-service/database/test:/liquibase/tests
      - ./postgres/test/_util:/liquibase/tests/_util
    command:
      - update

  liquibase_appointment_db:
    image: liquibase/liquibase:latest-alpine
    container_name: liquibase_appointment_db
    restart: on-failure
    env_file:
      - appointment-service/.env
    depends_on:
      administration_db:
        condition: service_healthy
    volumes:
      - ./appointment-service/database/changelog:/liquibase/changelog
      - ./appointment-service/database/test:/liquibase/tests
      - ./postgres/test/_util:/liquibase/tests/_util
    command:
      - update

  administration-service:
    image: jetty:11-jdk17-alpine-eclipse-temurin
    container_name: administration-service
    restart: on-failure
    depends_on:
      liquibase_administration_db:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 50s
    ports:
      - "8084:8080"
    volumes:
      - ./administration-service/build/libs/administration-service.war:/var/lib/jetty/webapps/ROOT.war
    env_file:
      - administration-service/.env
  
  appointment-service:
    image: jetty:11-jdk17-alpine-eclipse-temurin
    container_name: appointment-service
    restart: on-failure
    depends_on:
      liquibase_administration_db:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 50s
    ports:
      - "8085:8080"
    volumes:
      - ./appointment-service/build/libs/appointment-service.war:/var/lib/jetty/webapps/ROOT.war
    env_file:
      - appointment-service/.env

  auth-service:
    build:
      context: user-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: on-failure
    depends_on:
      liquibase_user_db:
        condition: service_completed_successfully
      liquibase_administration_db:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep '\"status\":\"UP\"'" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 50s
    ports:
      - "8086:8080"
    volumes:
      - ./auth-service/build/libs/auth-service.war:/var/lib/jetty/webapps/ROOT.war
    env_file:
      - auth-service/.env

volumes:
  user_db_volume:
  brand_db_volume:
  studio_db_volume:
  administration_db_volume:
